name: Greetings

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Send Greeting
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue, @${{ github.actor }}!
            
            Welcome to DocBot AI! 🚀
            
            Please provide:
            - Steps to reproduce
            - Expected vs actual behavior
            - Any error messages
            
          pr-message: |
            🎉 Thanks for your first pull request, @${{ github.actor}}!
            
            A maintainer will review your changes soon!
